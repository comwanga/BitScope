name: CI / Staging

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "staging/**"
      - "feature/**"
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ci-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker-staging-config:
    name: Docker staging config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config

  release-readiness:
    name: Release readiness
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker-staging-config
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required docs
        shell: bash
        run: |
          test -f README.md
          test -f docs/demo-script.md
          test -f docs/live-rpc-testing.md
          test -f docs/limitations.md
          test -f docs/docker-regtest.md

      - name: Summarize release gate
        shell: bash
        run: |
          {
            echo "## BitScope release readiness"
            echo "- Backend tests passed"
            echo "- Frontend build passed"
            echo "- Docker Compose config validated"
            echo "- Required teaching and operations docs are present"
          } >> "$GITHUB_STEP_SUMMARY"
